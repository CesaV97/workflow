<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WorkFlow — Visualización</title>
<link rel="stylesheet" href="styles.css?v=2"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="components/Icons.jsx"></script>
<script type="text/babel" src="components/Shell.jsx"></script>
<script type="text/babel" src="components/Dashboard.jsx"></script>
<script type="text/babel" src="components/Projects.jsx"></script>
<script type="text/babel" src="components/Tasks.jsx"></script>
<script type="text/babel" src="components/TaskDetail.jsx"></script>
<script type="text/babel" src="components/Reports.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [view, setView] = useState(() => localStorage.getItem('wf_view') || 'dashboard');
  const [selectedTask, setSelectedTask] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem('wf_theme') || 'dark');

  useEffect(() => { localStorage.setItem('wf_view', view); }, [view]);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('wf_theme', theme);
  }, [theme]);
  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  const projects = window.SEED_PROJECTS;
  const tasks = window.SEED_TASKS;
  const sessions = window.SEED_SESSIONS;

  const handleTaskSelect = (t) => setSelectedTask(t);
  const handleClose = () => setSelectedTask(null);

  const openTasks = tasks.filter(t => t.status !== 'Done').length;

  const renderView = () => {
    switch(view) {
      case 'dashboard':
        return <window.Dashboard
          projects={projects} tasks={tasks} sessions={sessions}
          onTaskSelect={handleTaskSelect}
          selectedTaskId={selectedTask?.id}/>;
      case 'projects':
        return <window.Projects projects={projects}/>;
      case 'tasks':
        return <window.Tasks
          tasks={tasks} projects={projects}
          onTaskSelect={handleTaskSelect}
          selectedTaskId={selectedTask?.id}/>;
      case 'reports':
        return <window.Reports sessions={sessions} tasks={tasks}/>;
      case 'settings':
        return <window.Settings/>;
      default:
        return <window.Dashboard projects={projects} tasks={tasks} sessions={sessions} onTaskSelect={handleTaskSelect}/>;
    }
  };

  return (
    <div className="app">
      <window.Sidebar
        currentView={view}
        onNavigate={(v)=>{ setView(v); }}
        taskCount={openTasks}/>
      <div className="app-main">
        <window.TopBar onNew={()=>setView('tasks')} theme={theme} onToggleTheme={toggleTheme}/>
        <div className="app-content">
          {renderView()}
        </div>
      </div>
      {selectedTask && (
        <window.TaskDetailPanel
          task={selectedTask}
          comments={window.SEED_COMMENTS[selectedTask.id] || []}
          onClose={handleClose}/>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
