<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TaskFlow · Mock B · Card mejorada</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --border: #30363d;
    --text: #f0f6fc;
    --muted: #8b949e;
    --accent1: #4a9eff;
    --accent2: #00d4ff;
    --accent3: #00e5a0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    position: relative;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  /* Aurora animated bg */
  .aurora, .aurora::before, .aurora::after {
    content: "";
    position: fixed;
    inset: -20%;
    pointer-events: none;
    z-index: 0;
  }
  .aurora {
    background: radial-gradient(circle at 50% 50%, rgba(74, 158, 255, 0.10), transparent 60%);
  }
  .aurora::before {
    background: radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.35), transparent 35%);
    filter: blur(80px);
    animation: drift1 18s ease-in-out infinite;
  }
  .aurora::after {
    background: radial-gradient(circle at 80% 70%, rgba(0, 229, 160, 0.28), transparent 35%);
    filter: blur(80px);
    animation: drift2 22s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(8%, 10%); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(-10%, -8%); }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 32px;
    background: rgba(22, 27, 34, 0.85);
    border-radius: 20px;
    backdrop-filter: blur(12px);
  }
  /* Gradient border via pseudo */
  .card::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(74, 158, 255, 0.5), rgba(0, 212, 255, 0.3), rgba(0, 229, 160, 0.5));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    font-size: 18px;
  }
  .brand-logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background:
      radial-gradient(circle at 30% 30%, var(--accent2), transparent 60%),
      linear-gradient(135deg, #1c2128, #0d1117);
    border: 1px solid rgba(74, 158, 255, 0.35);
    position: relative;
    overflow: hidden;
  }
  .brand-logo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(0, 229, 160, 0.5), transparent 55%);
  }
  .brand .flow {
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 24px;
    letter-spacing: -0.01em;
  }
  .copy {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }

  /* Tabs */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
    position: relative;
  }
  .tab {
    background: none;
    border: 0;
    padding: 10px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 7px;
    transition: color .15s;
  }
  .tab.active {
    color: var(--text);
    background: var(--bg3);
    box-shadow: 0 0 0 1px var(--border);
  }

  /* Social */
  .social {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .social button {
    padding: 11px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color .15s, background .15s;
  }
  .social button:hover {
    border-color: var(--accent2);
    background: var(--bg2);
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Floating labels */
  form { display: grid; gap: 14px; }
  .field {
    position: relative;
  }
  .field input {
    width: 100%;
    padding: 18px 14px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.18);
  }
  .field label {
    position: absolute;
    left: 14px;
    top: 14px;
    font-size: 15px;
    color: var(--muted);
    pointer-events: none;
    transition: transform .15s, font-size .15s, color .15s;
    transform-origin: left top;
  }
  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    transform: translateY(-7px) scale(0.78);
    color: var(--accent2);
  }
  .eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 0;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
  }
  .forgot {
    margin-top: -6px;
    text-align: right;
  }
  .forgot button {
    background: none;
    border: 0;
    color: var(--accent2);
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }
  .submit {
    margin-top: 6px;
    padding: 13px;
    border: 0;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
    color: #0d1117;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform .1s, box-shadow .2s;
  }
  .submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0, 212, 255, 0.35);
  }
  .back {
    position: fixed;
    top: 16px;
    right: 16px;
    padding: 8px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="aurora"></div>
  <a class="back" href="index.html">← Mocks</a>
  <div class="card">
    <div class="header">
      <div class="brand">
        <span class="brand-logo"></span>
        <span>TASK<span class="flow">FLOW</span></span>
      </div>
      <h1>Bienvenido de vuelta</h1>
      <p class="copy">Entra o crea tu cuenta para continuar.</p>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-in" onclick="toggle('in')">Iniciar sesión</button>
      <button class="tab" id="tab-up" onclick="toggle('up')">Crear cuenta</button>
    </div>

    <div class="social">
      <button type="button">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.8-.1-1.5-.2-2.2H12v4.2h5.9c-.3 1.4-1 2.6-2.2 3.4v2.8h3.5c2.1-1.9 3.3-4.8 3.3-8.2z"/><path fill="#34A853" d="M12 23c3 0 5.5-1 7.3-2.7l-3.5-2.8c-1 .7-2.3 1.1-3.8 1.1-2.9 0-5.4-2-6.3-4.6H2v2.9C3.9 20.7 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.7 14c-.2-.7-.4-1.4-.4-2.2s.1-1.5.4-2.2V6.8H2C1.4 8.2 1 9.8 1 11.8s.4 3.6 1 5l3.7-2.8z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3.1.6 4.3 1.7l3.1-3.1C17.5 2.2 15 1 12 1 7.7 1 3.9 3.3 2 6.8L5.7 9.6C6.6 7 9.1 5.4 12 5.4z"/></svg>
        Google
      </button>
      <button type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5 3.3 9.3 7.8 10.8.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2.9-.3 2-.4 3-.4s2.1.1 3 .4c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.5-1.5 7.8-5.8 7.8-10.8C23.5 5.7 18.3.5 12 .5z"/></svg>
        GitHub
      </button>
    </div>

    <div class="divider">o con email</div>

    <form onsubmit="event.preventDefault()">
      <div class="field">
        <input type="email" id="email" placeholder=" " autocomplete="email" />
        <label for="email">Email</label>
      </div>
      <div class="field">
        <input type="password" id="pass" placeholder=" " autocomplete="current-password" />
        <label for="pass">Contraseña</label>
        <button type="button" class="eye" aria-label="Mostrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="forgot"><button type="button">¿Olvidaste tu contraseña?</button></div>
      <button type="submit" class="submit">Entrar</button>
    </form>
  </div>
  <script>
    function toggle(which) {
      document.getElementById('tab-in').classList.toggle('active', which === 'in');
      document.getElementById('tab-up').classList.toggle('active', which === 'up');
    }
  </script>
</body>
</html>
